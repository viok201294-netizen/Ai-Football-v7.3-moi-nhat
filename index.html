<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>⚽ AI FOOTBALL Analyser v7.3 · MrV94</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Rajdhani',sans-serif;}
body{background:#070c18;display:flex;justify-content:center;}
#root{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;overflow:hidden;}
#page-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:88px;}
#page-wrap::-webkit-scrollbar{display:none;}

/* Grid bg */
#gbg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
  background-size:36px 36px;}

/* Header */
#hdr{position:sticky;top:0;z-index:50;padding:12px 16px 10px;border-bottom:1px solid var(--brd);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;}

/* Nav */
#nav{position:sticky;bottom:0;z-index:50;display:flex;border-top:1px solid var(--brd);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding:7px 0 calc(7px + env(safe-area-inset-bottom));flex-shrink:0;}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
  padding:5px 0;border-radius:10px;position:relative;transition:background 0.18s;
  flex:1;border:none;background:transparent;font-family:'Rajdhani',sans-serif;}
.ni-icon{font-size:18px;line-height:1;}
.ni-lbl{font-size:8px;letter-spacing:0.8px;text-transform:uppercase;font-weight:700;}
.nbadge{position:absolute;top:0;right:6px;min-width:15px;height:15px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;padding:0 3px;}

/* Cards */
.card{border-radius:13px;padding:13px;margin-bottom:11px;border:1px solid var(--brd);}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-size:9px;font-weight:700;letter-spacing:0.8px;white-space:nowrap;}

/* Inputs */
.ti{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:9px;
  padding:9px 11px;color:var(--txt);font-size:13px;font-family:'Rajdhani',sans-serif;
  outline:none;transition:border-color 0.18s;-webkit-appearance:none;}
.ti:focus{border-color:var(--ac);}
.on{width:100%;background:transparent;border:none;color:var(--gld);
  font-size:24px;font-weight:700;font-family:'Rajdhani',monospace;outline:none;padding:0;-webkit-appearance:none;}
.on::-webkit-inner-spin-button,.on::-webkit-outer-spin-button{-webkit-appearance:none;}
.ob{background:var(--bg);border-radius:9px;padding:9px 11px;flex:1;border:1px solid var(--brd);}
.ol{font-size:8px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}

/* Line scroll */
#lscroll{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  border-radius:9px;border:1px solid var(--brd);background:var(--bg);}
#lscroll::-webkit-scrollbar{display:none;}
#hscroll::-webkit-scrollbar{display:none;}
.lbtn{flex-shrink:0;border:none;border-right:1px solid var(--brd);cursor:pointer;
  font-family:'Rajdhani',monospace;font-weight:700;padding:9px 0;transition:all 0.13s;background:transparent;}

/* Sub tabs */
.stabs{display:flex;gap:4px;margin-bottom:13px;background:var(--card);border-radius:11px;
  padding:3px;border:1px solid var(--brd);}
.stab{flex:1;padding:7px 3px;border:1px solid transparent;border-radius:8px;
  font-size:9px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;
  transition:all 0.18s;background:transparent;}

/* Step cards */
.sc{border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid transparent;}
.sh{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;
  user-select:none;-webkit-user-select:none;}
.sbadge{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid transparent;}
.sbody{padding:0 13px 13px;}
.sarr{font-size:12px;transition:transform 0.22s;margin-left:auto;flex-shrink:0;color:var(--mut);}
.sarr.open{transform:rotate(180deg);}

/* Accordion (settings) */
.acc-item{border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid var(--brd);}
.acc-hd{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;
  user-select:none;-webkit-user-select:none;background:var(--card);}
.acc-body{padding:0 14px 14px;background:var(--card);}

/* PIN */
#pio{position:fixed;inset:0;background:rgba(0,0,0,0.92);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);z-index:200;display:flex;align-items:center;
  justify-content:center;max-width:430px;margin:auto;}
.pd{width:16px;height:16px;border-radius:50%;transition:all 0.12s;}
.kp{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:5px;}
.kb{padding:15px 0;font-size:21px;font-weight:700;font-family:'Rajdhani',monospace;
  border-radius:13px;cursor:pointer;transition:all 0.09s;border:1px solid var(--brd);
  background:var(--card);color:var(--txt);}
.kb:active{transform:scale(0.91);}
.kb.del{color:var(--red);}
.kb.emp{opacity:0;pointer-events:none;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
.shake{animation:shake 0.4s ease-in-out;}

/* Conflict alert */
.alert-conflict{border-radius:12px;padding:13px 14px;margin-bottom:11px;
  border:1px solid;animation:pulseBorder 2s infinite;}
@keyframes pulseBorder{0%,100%{opacity:1}50%{opacity:0.6}}
.alert-danger{border-radius:12px;padding:13px 14px;margin-bottom:11px;border:1px solid;}

/* Bars */
.pbar{height:9px;border-radius:5px;background:var(--bg);overflow:hidden;margin-top:5px;}
.pbfill{height:100%;border-radius:5px;transition:width 0.4s;}

/* Theme */
.tc{padding:12px;border-radius:13px;cursor:pointer;border:2px solid transparent;transition:all 0.18s;}
.tsw{display:flex;gap:4px;margin-top:7px;}
.sw{width:17px;height:17px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);}

/* Stats */
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px;}
.sbox{border-radius:11px;padding:12px 6px;text-align:center;border:1px solid var(--brd);background:var(--c2);}

/* Compare */
.crow{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
.cc{flex:1;border-radius:7px;padding:7px 0;text-align:center;border:1px solid var(--brd);font-size:12px;font-weight:700;}

/* Home hero */
@keyframes hglow{0%,100%{text-shadow:0 0 30px var(--ac),0 0 60px var(--ac2)}50%{text-shadow:0 0 50px var(--ac),0 0 100px var(--ac2)}}
.hero-title{animation:hglow 3s ease-in-out infinite;}
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(400%)}}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent);animation:scan 4s linear infinite;opacity:0.3;}

/* Anims */
@keyframes ballSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes loadbar{0%{width:0%}60%{width:75%}100%{width:100%}}
@keyframes fadeStep{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.18s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
button:active,.ni:active{opacity:0.7;}

/* Meta row */
.mr{display:flex;gap:4px;margin-top:9px;}
.mc{flex:1;border-radius:7px;padding:4px 2px;text-align:center;}
.divider{height:1px;margin:12px 0;}
.slabel{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:9px;
  display:flex;align-items:center;gap:7px;color:var(--mut);}
/* light mode text contrast helpers */
textarea.ie-input{width:100%;min-height:120px;background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:10px;color:var(--txt);font-size:11px;font-family:'Rajdhani',monospace;resize:vertical;outline:none;line-height:1.5;}
textarea.ie-input:focus{border-color:var(--ac);}
body.light-mode textarea.ie-input{background:#f0f4ff;color:#0d1a3a;border-color:#c8d4ec;}
body.light-mode #gbg{opacity:0.3;}
body.light-mode .card{box-shadow:0 1px 6px rgba(0,0,0,0.08);border-color:#c8d4ec;}
body.light-mode #hdr{box-shadow:0 1px 8px rgba(0,0,0,0.10);}
body.light-mode .txt-input{color:#0d1a3a;border-color:#b0c0dc;}
body.light-mode .txt-input::placeholder{color:#a0b0cc;}
body.light-mode .odds-num{color:#0d1a3a;}
body.light-mode .ni{color:#5a6a8a;}
body.light-mode #nav{border-top:1px solid #c8d4ec;}
body.light-mode .key-btn{background:#f8faff;color:#0d1a3a;border-color:#c8d4ec;}
body.light-mode .key-btn.del{color:#d93025;}
body.light-mode #pio,body.light-mode #explock{background:rgba(240,244,255,0.96);}
body.light-mode .sc{background:#ffffff;}
body.light-mode .sh{background:#ffffff;}
body.light-mode .lbtn{background:transparent;color:#0d1a3a;}
body.light-mode #lscroll{background:#f0f4ff;border-color:#c8d4ec;}
body.light-mode .stab{color:#7a8eb0;}
body.light-mode .stabs{background:#f0f4ff;border-color:#c8d4ec;}
body.light-mode .pd{border-color:#b0c0dc;}
body.light-mode .sbody{background:transparent;}
/* ── Welcome Screen ── */
@keyframes wlcFadeIn{from{opacity:0}to{opacity:1}}
@keyframes wlcSlideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes wlcPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.8}}
@keyframes wlcFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes wlcGlow{0%,100%{text-shadow:0 0 20px #00e5ff,0 0 40px #00e5ff44}50%{text-shadow:0 0 40px #00e5ff,0 0 80px #00e5ff88,0 0 120px #00e5ff22}}
@keyframes wlcRingOut{0%{transform:scale(0.6);opacity:0.8}100%{transform:scale(2.2);opacity:0}}
@keyframes wlcScanLine{0%{top:-10%}100%{top:110%}}
@keyframes wlcBarFill{0%{width:0%}40%{width:55%}70%{width:80%}90%{width:95%}100%{width:100%}}
@keyframes wlcParticle{0%{transform:translateY(0) scale(1);opacity:0.7}100%{transform:translateY(-120px) scale(0);opacity:0}}
@keyframes wlcBtnPulse{0%,100%{box-shadow:0 0 0 0 #00e5ff44}70%{box-shadow:0 0 0 16px transparent}}
</style>
</head>
<body>
<div id="root">
  <div id="gbg"></div>
  <div id="hdr"></div>
  <div id="page-wrap"><div id="pc" class="fade-in" style="padding:0 14px;"></div></div>
  <div id="nav"></div>
  <div id="pio" style="display:none;"></div>
  <div id="pl-warn-overlay" style="display:none"></div>
<div id="explock" style="display:none;"></div>
  <div id="ie-overlay" style="display:none;"></div>
  <div id="welcome-overlay" style="display:none;position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;"></div>
</div>
<script>
/* ═══════════════════════════════════════════
   IMPORT / EXPORT DATA
═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   MIGRATE / NORMALIZE A RECORD
   (called on load AND on import)
═══════════════════════════════════════════ */
function migrateRecord(r){
  if(r.goiyChap==null)r.goiyChap=0;
  if(r.hcResult&&(r.hcResult.absDiff==null||r.hcResult.loai==null)){
    const mh=r.form&&r.form.mh;
    r.hcResult=xuLyKeoChap(r.goiyChap,mh!=null?mh:'');
  }
  if(r.outcome&&!r.outcomeOU){r.outcomeOU=r.outcome;}
  delete r.outcome;
  if(!r.safety||typeof r.safety!=='object') r.safety={safe:true,tPct:50,xPct:50};
  if(!r.kp||typeof r.kp!=='object') r.kp={pri:0,sec:0,warn:''};
  if(r.conf&&r.conf.starsN==null){
    r.conf.starsN=typeof r.conf.stars==='string'
      ?r.conf.stars.replace(/[^⭐★]/g,'').length:(r.conf.stars||0);
  }
  if(!r.conf||typeof r.conf!=='object') r.conf={stars:'⭐⭐⭐',starsN:3,lb:'TRUNG BÌNH',c:'#ffd700'};
  const _fs={sig:'N',c:'#ffd700',ic:'⚠️',lv:'—',lb:'—',nt:'—',d:0};
  if(!r.eO1)r.eO1={..._fs};
  if(!r.eG) r.eG={..._fs};
  if(!r.eCP)r.eCP={..._fs};
  if(!r.ePT)r.ePT={..._fs};
  if(!r.sigs)r.sigs=[];
  if(!r.specials)r.specials=[];
  if(r.note==null)r.note='';
  return r;
}

function openIE(action){
  S.ieAction=action;
  S.importExportMode=true;
  S.ieSel=[];
  S.importData='';
  S.importPreview=[];
  render();
}

function closeIE(){
  S.importExportMode=false;
  S.ieAction=null;
  S.ieSel=[];
  S.importData='';
  S.importPreview=[];
  render();
}

function toggleIESel(ts){
  if(S.ieSel.includes(ts)){
    S.ieSel=S.ieSel.filter(x=>x!==ts);
  } else {
    S.ieSel.push(ts);
  }
  render();
}

function selAllIE(){
  const list=S.ieAction==='export' ? S.hist : S.importPreview;
  S.ieSel=list.map(r=>r.ts);
  render();
}

function deselAllIE(){
  S.ieSel=[];
  render();
}

function doExportData(){
  if(!S.ieSel.length){toastErr('⚠️ Chưa chọn kèo nào để xuất');return;}
  const exportData=S.hist.filter(r=>S.ieSel.includes(r.ts));
  const payload={version:'v7.3',exportedAt:Date.now(),count:exportData.length,data:exportData};
  const jsonStr=JSON.stringify(payload,null,2);
  const ts=new Date().toISOString().slice(0,10);
  const filename=`keo_${ts}_${exportData.length}tran.json`;
  const blob=new Blob([jsonStr],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  navigator.vibrate&&navigator.vibrate([30,20,30]);
  toastOK(`✅ Đã xuất file ${filename}`);
  closeIE();
}

function loadFileForImport(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      S.importData=ev.target.result;
      parseImportData();
    };
    reader.readAsText(file);
  };
  inp.click();
}

function parseImportData(){
  const raw=(S.importData||'').trim();
  if(!raw){toastErr('⚠️ Chưa có dữ liệu JSON');return;}
  try{
    const parsed=JSON.parse(raw);
    if(!parsed.data||!Array.isArray(parsed.data)) throw new Error('Thiếu trường "data"');
    const valid=[]; const errs=[];
    parsed.data.forEach((r,i)=>{
      if(!r.ts||!r.form||!r.o1||!r.o2){errs.push(i+1);return;}
      valid.push({...r, ts:Date.now()+i, importedFrom:r.ts, importedAt:Date.now()});
    });
    S.importPreview=valid;
    S.ieSel=valid.map(r=>r.ts); // tự chọn tất cả
    if(errs.length) toastWarn(`⚠️ ${errs.length} kèo lỗi, ${valid.length} hợp lệ`);
    else toastOK(`✅ ${valid.length} kèo — nhấn Import để thêm vào lịch sử`);
    render();
  }catch(e){
    toastErr('❌ File không hợp lệ: '+e.message);
    S.importPreview=[]; render();
  }
}

function doImportData(){
  if(!S.ieSel.length){toastErr('⚠️ Chưa chọn kèo nào');return;}
  if(!S.importPreview.length){toastErr('⚠️ Chưa tải file');return;}
  const toImport=S.importPreview.filter(r=>S.ieSel.includes(r.ts));
  const newOnes=[]; let dups=0;
  toImport.forEach(imp=>{
    const dup=S.hist.find(ex=>ex.form.tA===imp.form.tA&&ex.form.tB===imp.form.tB&&Math.abs(ex.ts-imp.importedFrom)<86400000);
    if(dup) dups++;
    else newOnes.push(imp);
  });
  S.hist=[...newOnes.map(migrateRecord),...S.hist];
  let msg=`✅ Đã thêm ${newOnes.length} kèo vào lịch sử`;
  if(dups) msg+=` (${dups} trùng, bỏ qua)`;
  toastOK(msg);
  closeIE();
  S.tab='history'; render();
}

/* ═══════════════════════════════════════════
   RENDER IMPORT / EXPORT OVERLAY
═══════════════════════════════════════════ */
function renderImportExport(){
  const t=resolveTheme();
  const isExport=S.ieAction==='export';
  const list=isExport?S.hist:S.importPreview;
  const bg=t.isDark?'rgba(7,12,24,0.98)':'rgba(240,244,255,0.98)';

  // ── danh sách kèo ──
  const listRows=list.map(r=>{
    const sel=S.ieSel.includes(r.ts);
    const d=new Date(r.ts);
    const tm=`${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const rc=r.rec==='T'?(t.isDark?'#00e676':'#1a7a40'):(t.isDark?'#ff6d00':'#cc4400');
    return `<div onclick="toggleIESel(${r.ts})" style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid ${t.brd}22;cursor:pointer;background:${sel?t.ac+'14':'transparent'};transition:background 0.12s">
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${sel?t.ac:t.brd};background:${sel?t.ac:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s">
        ${sel?'<div style="width:7px;height:7px;border-radius:50%;background:#fff"></div>':''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;color:${t.txt};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.form&&r.form.tA)||'?'} vs ${esc(r.form&&r.form.tB)||'?'}</div>
        <div style="font-size:9px;color:${t.mut};margin-top:1px">${esc(r.form&&r.form.lg)||'—'} · ${tm}</div>
      </div>
      <div style="font-size:11px;font-weight:700;color:${rc};flex-shrink:0">${r.rec==='T'?'TÀI':'XỈU'}</div>
    </div>`;
  }).join('');

  const emptyMsg=`<div style="text-align:center;padding:40px 20px;color:${t.mut}">
    <div style="font-size:40px;margin-bottom:10px">${isExport?'📂':'📁'}</div>
    <div style="font-size:12px">${isExport?'Lịch sử trống':'Chưa tải file — nhấn nút bên dưới'}</div>
  </div>`;

  // ── khu vực nhập file (chỉ hiện khi Import) ──
  const importZone=!isExport?`
    <div style="padding:13px 14px;border-top:1px solid ${t.brd}33">
      <button onclick="loadFileForImport()" style="width:100%;padding:13px;background:${t.a2}18;border:2px dashed ${t.a2}55;border-radius:11px;color:${t.a2};font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px">
        📁 Chọn file .json đã xuất
      </button>
      ${S.importPreview.length?`<div style="margin-top:8px;font-size:10px;color:${t.gr};text-align:center">✅ Đã tải ${S.importPreview.length} kèo — chọn kèo muốn import rồi nhấn Import</div>`:''}
    </div>`:'';

  // ── nút chọn tất cả (chỉ hiện khi có list) ──
  const selBtns=list.length>0?`<div style="display:flex;gap:5px">
    <button onclick="selAllIE()" style="font-size:9px;padding:4px 9px;background:${t.ac}18;border:1px solid ${t.ac}33;border-radius:7px;color:${t.ac};cursor:pointer;font-family:'Rajdhani',sans-serif">☑ Tất cả</button>
    <button onclick="deselAllIE()" style="font-size:9px;padding:4px 9px;background:${t.brd};border:none;border-radius:7px;color:${t.mut};cursor:pointer;font-family:'Rajdhani',sans-serif">☐ Bỏ</button>
  </div>`:'';

  // ── nút action chính ──
  const n=S.ieSel.length;
  const mainBtn=isExport

/* ═══════════════════════════════════════════

function evalO1(o1){
  const c=S.cfg,p=+(100/o1).toFixed(1);
  if(o1<=c.o1_tai_strong)return{sig:"T",c:"#00e676",ic:"🟢",lv:"Tín hiệu TÀI mạnh",nt:`odds1=${o1} ≤ ${c.o1_tai_strong} — P=${p}%`};
  if(o1< c.o1_tai_edge) return{sig:"T",c:"#69ff47",ic:"🟢",lv:"Biên TÀI",nt:`odds1=${o1} gần ngưỡng ${c.o1_tai_strong}`};
  if(o1<=c.o1_xiu_edge) return{sig:"N",c:"#ffd700",ic:"⚠️",lv:`Vùng nhạy cảm ${c.o1_tai_edge}–${c.o1_xiu_edge}`,nt:`odds1=${o1} — dễ bất ngờ`};
  if(o1< c.o1_xiu_signal)return{sig:"N",c:"#ff9100",ic:"⚠️",lv:"Biên cảnh báo Xỉu",nt:`odds1=${o1} sắp chạm ${c.o1_xiu_signal}`};
  return           {sig:"X",c:"#ff1744",ic:"🔴",lv:"Tín hiệu XỈU",nt:`odds1=${o1} ≥ ${c.o1_xiu_signal} — thống kê ~70% trận Xỉu`};
}
function evalGAP(g){
  const c=S.cfg,t1=c.gap_tai,t2=c.gap_xiu,t1e=+(t1+0.01).toFixed(2),t2e=+(t2-0.01).toFixed(2);
  if(g<=t1) return{sig:"T",c:"#00e676",ic:"🟢",lb:"TÀI mạnh",nt:`GAP=${g} ≤ ${t1}`};
  if(g< t1e)return{sig:"T",c:"#69ff47",ic:"🟢",lb:"Biên TÀI",nt:`GAP=${g} sát ${t1}`};
  if(g<=t2e)return{sig:"N",c:"#ffd700",ic:"⚠️",lb:`Vùng khó đoán ${t1e}–${t2e}`,nt:`GAP=${g} — tỷ lệ đúng ~50%`};
  if(g< t2) return{sig:"N",c:"#ff9100",ic:"⚠️",lb:"Sát ngưỡng Xỉu",nt:`GAP=${g}`};
  return          {sig:"X",c:"#ff1744",ic:"🔴",lb:"XỈU mạnh",nt:`GAP=${g} ≥ ${t2}`};
}
function evalCP(cp){
  const c=S.cfg;
  if(cp>c.cp_tai) return{sig:"T",c:"#00e676",ic:"🟢",lb:"TÀI rất mạnh",nt:`${cp.toFixed(1)}% > ${c.cp_tai}% — kịch bản 1-1 rất thấp`};
  if(cp>=c.cp_xiu)return{sig:"N",c:"#ffd700",ic:"⚠️",lb:`Vùng trung gian ${c.cp_xiu}–${c.cp_tai}%`,nt:`${cp.toFixed(1)}% — cần xem thêm tín hiệu khác`};
  return          {sig:"X",c:"#ff1744",ic:"🔴",lb:"XỈU chiếm ưu thế",nt:`${cp.toFixed(1)}% < ${c.cp_xiu}% — tỉ số 1-1 ưu thế`};
}
function evalPT(pt){
  const bench=S.cfg.pt_bench/100;
  const d=+(pt*100-S.cfg.pt_bench).toFixed(2);
  if(pt>bench)return{sig:"T",c:"#00e676",ic:"🟢",lb:"Tài có giá trị",d};
  if(pt<bench)return{sig:"X",c:"#ff1744",ic:"🔴",lb:"Xỉu có giá trị",d};
  return          {sig:"N",c:"#ffd700",ic:"⚠️",lb:`Cân bằng ~${S.cfg.pt_bench}%`,d:0};
}

/* ── Kèo phụ vs kèo chính comparison ── */
function evalKeoPhu(ptRaw){
  // FIX: Thêm kiểm tra ptRaw hợp lệ trước khi tính toán
  if(ptRaw==null||ptRaw===''||isNaN(ptRaw)){
    return{lv:"unknown", msg:"Chưa có dữ liệu P_total",c:"#6b7db3",pri:false,skip:true};
  }
  const c=S.cfg, diff=+(ptRaw*100-c.pt_bench).toFixed(2), adiff=Math.abs(diff);
  if(adiff<c.kp_ignore) return{lv:"ignore", msg:`Chênh lệch chỉ ${diff}% — không đáng kể, bỏ qua`,c:"#6b7db3",pri:false,skip:true};
  if(adiff<c.kp_mild)   return{lv:"mild",   msg:`Chênh lệch vừa (${diff>0?'+':''}${diff}%) — kèo phụ ${diff>0?'nhỉnh':'thấp hơn'} kèo chính`,c:diff>0?"#00e676":"#ff6d00",pri:false,skip:false};
  if(adiff<c.kp_notable)return{lv:"notable",msg:`Chênh lệch đáng kể (${diff>0?'+':''}${diff}%) — cân nhắc ưu tiên kèo phụ BTTS+O2.5`,c:diff>0?"#00e676":"#ff9100",pri:false,skip:false};
  return                     {lv:"strong",  msg:`⚡ CHÊNH LỆCH BẤT THƯỜNG (${diff>0?'+':''}${diff}%) — ƯU TIÊN KÈO PHỤ BTTS+O2.5`,c:"#ff1744",pri:true,skip:false};
}

/* ── Safety score ── */
function calcSafety(sigs,rec){
  // weight: T=1, N=0.5, X=0
  const score=sigs.reduce((a,s)=>a+(s==="T"?1:s==="N"?0.5:0),0)/sigs.length;
  const tPct=+(score*100).toFixed(1);
  const xPct=+(100-tPct).toFixed(1);
  const safe=rec==="T"?tPct>=S.cfg.safety_min:xPct>=S.cfg.safety_min;
  return{tPct,xPct,safe,score};
}

function calcConf(tS,xS,rec){
  const d=rec==="T"?tS:xS;
  if(d>=4)return{stars:"⭐⭐⭐⭐⭐",starsN:5,lb:"RẤT CAO",c:T().gr};
  if(d===3)return{stars:"⭐⭐⭐⭐",  starsN:4,lb:"CAO",   c:T().gd};
  if(d===2)return{stars:"⭐⭐⭐",   starsN:3,lb:"TRUNG BÌNH",c:T().or};
  return       {stars:"⭐⭐",     starsN:2,lb:"THẤP",  c:T().rd};
}

/* ── Kèo Chấp module (Ver 5.1) ── */
function calcHandicap(o1,o2,ml){
  const c=S.cfg;
  // FIX: Thêm boundary check để tránh giá trị NaN hoặc vượt phạm vi
  if(!o1||!o2||o1<=0||o2<=0) return null;
  let base=((c.hc_xiu_signal-o1)/c.hc_khoang_cach)*c.hc_he_so;
  const gap=+(o2-o1).toFixed(3);
  if(gap<=c.hc_gap_nho)      base+=c.safe_delta;
  else if(gap>=c.hc_gap_lon) base-=c.safe_delta;
  if(ml>=c.hc_ou_cao)        base+=c.safe_delta;
  else if(ml<=c.hc_ou_thap)  base-=c.safe_delta;
  // FIX: Giới hạn giá trị trong phạm vi hợp lý (-4 đến +4)
  base=Math.max(-4,Math.min(4,base));
  return Math.round(base*4)/4; // can be negative for very low odds1
}
function fmtHC(v){if(v==null||v!==v||typeof v==='undefined')return '—';return(+v>=0?'+':'')+Number(v).toFixed(2);}
/* === CHỈNH SỬA: xuLyKeoChap với ngưỡng 0.25 bypass === */
function xuLyKeoChap(goiy,chinh){
  if(chinh===''||chinh==null)return null;
  const g=+goiy,c=+chinh;
  if(isNaN(g)||isNaN(c))return null;
  const ag=Math.abs(g), ac=Math.abs(c);
  const absDiff=+(ag-ac).toFixed(2);
  const oppSign=(g>0.01&&c<-0.01)||(g<-0.01&&c>0.01);
  
  // === NGƯỠNG BỎ QUA 0.25 ===
  const bypassThreshold = S.cfg.hc_bypass || 0.25;
  const tolerance = 0.001;
  const isBypass = Math.abs(absDiff - bypassThreshold) < tolerance && !oppSign;
  
  if(isBypass){
    return{
      loai:'bypass',
      chon:null,
      bay:false,
      bypass:true,
      absDiff,oppSign,goiy:g,chinh:c,
      msg:'Chênh lệch 0.25 — 50/50 không an toàn, bỏ qua kèo chấp'
    };
  }
  // =========================
  
  let loai,chon,bay;
  if(!oppSign && Math.abs(absDiff)<0.01){
    loai='ok'; chon=null; bay=false;
  } else if(ag<ac||oppSign&&ag<ac){
    loai='cao'; chon='duoc_chap'; bay=Math.abs(absDiff)>=0.5||oppSign;
  } else {
    loai='thap'; chon='chap'; bay=Math.abs(absDiff)>=0.5||oppSign;
  }
  return{loai,chon,bay,absDiff,oppSign,goiy:g,chinh:c,bypass:false};
}

function runAnalysis(form){
  const o1=+form.o1, o2=+form.o2, ml=+form.ml||2.5;
  const p2=+(100/o1).toFixed(2), p3=+(100/o2).toFixed(2);
  const gap=+((o2-o1).toFixed(3));
  const condP=+(o1/o2*100).toFixed(2);
  const ptRaw=1/o2+(S.cfg.pt_buffer/100), ptPct=+(ptRaw*100).toFixed(2);
  const bench=S.cfg.pt_bench;

  // ── V7.2 CORE DECISION: P_total vs nguong_so_sanh (53%) ──
  const borderline = Math.abs(ptPct - bench) <= 1; // ±1% sensitive zone
  const rec = ptRaw > bench/100 ? "T" : "X";

  // Signals kept for display & context
  const eO1=evalO1(o1), eG=evalGAP(gap), eCP=evalCP(condP), ePT=evalPT(ptRaw);
  const sigs=[eO1.sig,eG.sig,eCP.sig,ePT.sig];
  const tS=sigs.filter(s=>s==="T").length, xS=sigs.filter(s=>s==="X").length;

  // Conflict = signals disagree with v7.2 decision
  const sigRec=tS>xS?"T":xS>tS?"X":null;
  const conflict = sigRec!==null && sigRec!==rec;

  const conf=calcConf(tS,xS,rec);
  const safety=calcSafety(sigs,rec);
  const kp=evalKeoPhu(ptRaw);

  const safeLine=rec==="T"?+(ml-S.cfg.safe_delta).toFixed(2):+(ml+S.cfg.safe_delta).toFixed(2);
  const betLbl=rec==="T"?`TÀI O${safeLine}`:`XỈU O${safeLine}`;
  const betC=rec==="T"?T().gr:T().or;

  // Special cases / notes
  const specials=[];
  if(borderline) specials.push("⚠️ Vùng nhạy cảm: P_total="+ptPct+"% ≈ "+bench+"% (±1%) — kết hợp GAP và P(≥3|BTTS) để xác nhận");
  if(gap>0.30&&condP>80) specials.push("⚡ GAP > 0.30 nhưng P(≥3|BTTS) > 80% — GAP có thể đánh lừa, P_total quyết định");
  if(o1>=1.83&&ptRaw>bench/100) specials.push("⚡ odds1 ≥ 1.83 nhưng P_total > "+bench+"% — V7.2 ưu tiên TÀI theo P_total");
  if(conflict) specials.push("⚡ Tín hiệu phụ nghiêng "+(sigRec==="T"?"TÀI":"XỈU")+" nhưng P_total="+ptPct+"% → V7.2 quyết định "+(rec==="T"?"TÀI":"XỈU"));

  const reason = rec==="T"
    ? `P_total=${ptPct}% > ${bench}% (ngưỡng V7.2) → TÀI. Safe line: O${safeLine}`
    : `P_total=${ptPct}% ≤ ${bench}% (ngưỡng V7.2) → XỈU. Safe line: O${safeLine}`;

  const goiyChap=calcHandicap(o1,o2,ml);
  const hcResult=xuLyKeoChap(goiyChap,form.mh);
  return{o1,o2,ml,p2,p3,gap,condP,ptRaw,ptPct,borderline,eO1,eG,eCP,ePT,sigs,tS,xS,conflict,specials,kp,safety,conf,rec,safeLine,betLbl,betC,reason,goiyChap,hcResult,hcSide:form.hcSide||'home',form:{...form},ts:Date.now(),
  initO1:+form.initO1||0,initO2:+form.initO2||0,matchTime:form.matchTime||'',note:''};
}

function _toast(m,bg,border){
  let e=document.getElementById('_t');
  if(!e){e=document.createElement('div');e.id='_t';
    e.style.cssText='position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);padding:9px 18px;border-radius:14px;font-size:12px;font-weight:700;z-index:999;max-width:320px;text-align:center;transition:opacity 0.25s,transform 0.25s;pointer-events:none;font-family:Rajdhani,sans-serif;letter-spacing:0.5px;border:1px solid';
    document.body.appendChild(e);}
  e.textContent=m;
  e.style.background=bg;e.style.borderColor=border;e.style.color='#fff';
  e.style.opacity='1';e.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(e._t);
  e._t=setTimeout(()=>{e.style.opacity='0';e.style.transform='translateX(-50%) translateY(-10px)';},2200);
}

function getVNTime(){
  const now=new Date();
  // UTC+7
  const vn=new Date(now.getTime()+7*3600000);
  const days=['CN','T2','T3','T4','T5','T6','T7'];
  const dow=days[vn.getUTCDay()];
  const hh=String(vn.getUTCHours()).padStart(2,'0');
  const mm=String(vn.getUTCMinutes()).padStart(2,'0');
  const ss=String(vn.getUTCSeconds()).padStart(2,'0');
  const dd=String(vn.getUTCDate()).padStart(2,'0');
  const mo=String(vn.getUTCMonth()+1).padStart(2,'0');
  const yy=vn.getUTCFullYear();
  return{time:`${hh}:${mm}:${ss}`,date:`${dow} ${dd}/${mo}/${yy}`};
}

  const confPct=isTai?sf.tPct:sf.xPct;
  const oppPct=isTai?sf.xPct:sf.tPct;

    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px">
      <span style="color:${t.gr}">▪ Khả năng TÀI: <b>${sf.tPct}%</b></span>

}

}

/* ── Step Cards ── */
function renderSteps(r){
  const t=T();
  function sc(num,color,title,sum,body,hl=false){
    const open=!S.cs[num];
    return `<div class="sc" style="border-color:${color}${hl?'88':'33'};background:${t.card};${hl?`box-shadow:0 0 25px ${color}14`:''}">
      <div class="sh" onclick="togStep(${num})">

          ${S.cs[num]?`<div style="font-size:12px;font-weight:700;color:${t.txt};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sum}</div>`:''}
        </div>
        ${hl?chip('KEY',color):''}

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:11px">

        <div style="font-size:8px;color:${t.mut};margin-top:2px">${sub}</div>
      </div>`).join('')}
    </div>
    ${pbar(+r.p2,t.gd)}<div style="font-size:8px;color:${t.mut};margin-top:2px;text-align:right">P(BTTS≥2) = ${p1(+r.p2)}</div>
    <div style="margin-top:5px">${pbar(+r.p3,t.ac)}<div style="font-size:8px;color:${t.mut};margin-top:2px;text-align:right">P(BTTS≥3) = ${p1(+r.p3)}</div></div>`;

  // S2: odds1 + GAP
  const s2b=`
    <div style="margin-bottom:11px;background:${t.bg};border-radius:9px;padding:11px;border:1px solid ${r.eO1.c}44">

        <span style="font-size:17px">${r.eO1.ic}</span>
        <div style="font-size:13px;font-weight:700;color:${r.eO1.c}">${r.eO1.lv}</div>
      </div>
      <div style="font-size:11px;color:${t.mut};line-height:1.6">${r.eO1.nt}</div>
      <div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">${chip('≤1.55 TÀI',t.gr)}${chip('1.60–1.80 ⚠️',t.gd)}${chip('≥1.83 XỈU',t.rd)}</div>
    </div>
    <div style="background:${t.bg};border-radius:9px;padding:11px;border:1px solid ${r.eG.c}44">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:17px">${r.eG.ic}</span>
        <div style="font-size:13px;font-weight:700;color:${r.eG.c}">${r.eG.lb}</div>
      </div>

    <div style="text-align:center;margin-bottom:13px">

      <div style="position:absolute;left:${60}%;top:0;width:1px;height:100%;background:${t.rd};opacity:0.5"></div>
      <div style="position:absolute;left:${80}%;top:0;width:1px;height:100%;background:${t.gr};opacity:0.5"></div>
      <div style="height:100%;width:${cpBar}%;background:linear-gradient(90deg,${t.a2},${r.eCP.c});border-radius:7px;transition:width 0.4s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:8px;color:${t.mut};margin-bottom:11px"><span>0%</span><span style="color:${t.rd}">60%</span><span style="color:${t.gr}">80%</span><span>100%</span></div>
    <div style="background:${t.bg};border-radius:8px;padding:10px;border:1px solid ${r.eCP.c}33;font-size:11px;color:${t.mut};line-height:1.7">${r.eCP.nt}</div>`;

  // S4: P_total — KEY
  const ptBar=Math.min(+r.ptPct,100), diff=r.ePT.d;
  const s4b=`
    <div style="display:flex;align-items:stretch;border-radius:11px;overflow:hidden;border:1px solid ${t.brd};margin-bottom:13px">
      <div style="flex:1;padding:13px 8px;text-align:center;background:${t.ac}0a">

      </div>
      <div style="width:1px;background:${t.brd}"></div>
      <div style="width:38px;display:flex;align-items:center;justify-content:center;background:${r.ePT.c}0a;flex-shrink:0">

      <div style="flex:1;padding:13px 8px;text-align:center;background:${t.gd}0a">

    <div style="position:relative;height:12px;background:${t.bg};border-radius:6px;overflow:hidden;margin-bottom:5px">
      <div style="position:absolute;left:${S.cfg.pt_bench}%;top:0;width:2px;height:100%;background:${t.gd};opacity:0.7"></div>
      <div style="height:100%;width:${ptBar}%;background:linear-gradient(90deg,${t.a2},${r.ePT.c});border-radius:6px;transition:width 0.4s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:11px">
      <span style="color:${t.mut}">P_total=${p1(+r.ptPct)}</span>
      <span style="color:${r.ePT.c};font-weight:700">${diff>0?'+':''}${diff}% vs ${S.cfg.pt_bench}%</span>
    </div>
    <div style="padding:11px;border-radius:9px;text-align:center;background:${r.ePT.c}10;border:1px solid ${r.ePT.c}44">
      <div style="font-size:15px;font-weight:700;color:${r.ePT.c}">${r.ePT.ic} ${r.ePT.lb}</div>
    </div>`;

  // S5: Signals summary + conflict highlight + safety + keo phu
  const items=[
    {lb:'Ngưỡng odds1',e:r.eO1,nt:`odds1=${r.o1}`},
    {lb:'GAP',         e:r.eG, nt:`GAP=${r.gap}`},
    {lb:'P(≥3|BTTS)',  e:r.eCP,nt:`${p1(+r.condP)}`},
    {lb:'P_total',     e:r.ePT,nt:`${p1(+r.ptPct)}`},
  ];

  // ── Conflict highlight block ──
  const conflictBlock = r.conflict ? `
    <div style="border-radius:11px;padding:11px 13px;margin-bottom:9px;border:2px solid ${t.gd}66;background:linear-gradient(135deg,${t.gd}10,${t.gd}04);box-shadow:0 0 20px ${t.gd}18">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <span style="font-size:18px">⚡</span>
        <div style="font-size:12px;font-weight:700;color:${t.gd};letter-spacing:1px;text-transform:uppercase">Tín hiệu mâu thuẫn!</div>
        <div style="margin-left:auto;display:flex;gap:4px">${chip(`TÀI ×${r.tS}`,t.gr)}${chip(`XỈU ×${r.xS}`,t.rd)}</div>
      </div>
      <div style="font-size:11px;color:${t.mut};line-height:1.8">
        ${r.eG.sig==='X'&&r.eCP.sig==='T'?`• GAP lớn (${r.gap}) → Xỉu, nhưng P(≥3|BTTS)=${p1(+r.condP)} → Tài<br>• Khi mâu thuẫn: <b style="color:${t.gd}">ưu tiên P(≥3|BTTS) và P_total hơn GAP đơn thuần</b>`:''}

  const safe = r.safety;
  const unsafeBg = !safe.safe ? `background:linear-gradient(135deg,${t.rd}10,${t.rd}04);border-color:${t.rd}55` : `background:${t.gr}08;border-color:${t.gr}33`;

    <div style="border-radius:11px;padding:11px 13px;margin-bottom:9px;border:1px solid;${unsafeBg}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:16px">${safe.safe?'🛡️':'⚠️'}</span>

    </div>`;

  // ── Kèo phụ vs kèo chính comparison block ──
  const kp = r.kp;
  let kpBlock = '';
  if(kp.skip){
    kpBlock=`<div style="border-radius:9px;padding:10px 13px;margin-bottom:9px;background:${t.bg};border:1px solid ${t.brd}">
      <div style="font-size:10px;color:${t.mut};line-height:1.6">📊 <b style="color:${t.mut}">Kèo phụ vs kèo chính:</b> ${kp.msg}</div>

    kpBlock=`<div style="border-radius:11px;padding:11px 13px;margin-bottom:9px;border:${isStrong?'2px':'1px'} solid ${kp.c}${isStrong?'88':'44'};background:${kp.c}${isStrong?'14':'0a'};${isStrong?`box-shadow:0 0 18px ${kp.c}22`:''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
        <span style="font-size:${isStrong?18:16}px">${isStrong?'🚨':isNotable?'📌':'📊'}</span>
        <div style="font-size:${isStrong?12:11}px;font-weight:700;color:${kp.c};${isStrong?'text-transform:uppercase;letter-spacing:1px':''}">${isStrong?'CHÊNH LỆCH BẤT THƯỜNG':'So sánh kèo phụ vs kèo chính'}</div>

          <div style="font-size:20px;font-weight:700;color:${t.ac};font-family:'Rajdhani',monospace">${p1(+(100/r.o2).toFixed(2))}</div>

        <div style="flex:1;background:${t.bg};border-radius:8px;padding:8px;text-align:center;border:1px solid ${t.gd}33">

          <div style="font-size:20px;font-weight:700;color:${t.gd};font-family:'Rajdhani',monospace">51%</div>

  }

  // borderline zone alert
  const borderlineBlock = r.borderline ? `
    <div style="border-radius:10px;padding:10px 13px;margin-bottom:9px;border:2px solid ${t.gd}55;background:${t.gd}0a">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">🎯</span>
        <div>
          <div style="font-size:11px;font-weight:700;color:${t.gd}">VÙNG NHẠY CẢM (±1%)</div>

  const s5b=`
    ${borderlineBlock}
    ${conflictBlock}
    ${items.map(it=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:9px;margin-bottom:6px;background:${it.e.c}10;border:1px solid ${it.e.c}33">
      <span style="font-size:15px">${it.e.ic}</span>

        <div style="font-size:11px;color:${it.e.c};font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.nt} → ${it.e.lb||it.e.lv}</div>
      </div>
      ${chip(it.e.sig==='N'?'⚠️ NEUT':it.e.sig==='T'?'TÀI':'XỈU',it.e.sig==='T'?t.gr:it.e.sig==='X'?t.rd:t.gd)}
    </div>`).join('')}
    <div style="font-size:10px;color:${t.mut};font-style:italic;line-height:1.7;padding:10px;background:${t.bg};border-radius:8px;border:1px solid ${t.brd};margin-bottom:9px">💡 ${r.reason}</div>
    ${safetyBlock}
    ${kpBlock}`;

  return sc(1,t.a2,'Bước 1 — Xác suất cơ bản',`P(≥2)=${p1(+r.p2)}, P(≥3)=${p1(+r.p3)}, GAP=${r.gap}`,s1b)
       + sc(2,t.gd, 'Bước 2 — Ngưỡng odds1 & GAP',`odds1=${r.o1}→${r.eO1.lv} | GAP=${r.gap}→${r.eG.lb}`,s2b)
       + sc(3,r.eCP.c,'Bước 3 — P(≥3|BTTS) [QUYẾT ĐỊNH]',`${p1(+r.condP)} → ${r.eCP.lb}`,s3b,true)
       + sc(4,r.ePT.c,'Bước 4–5 — P_total(≥3) vs 51%',`${p1(+r.ptPct)} → ${r.ePT.lb}`,s4b,true)
       + sc(5,r.conflict?t.gd:r.rec==='T'?t.gr:t.or,'Bước 6 — Tổng hợp & Kết luận',`${r.tS} Tài · ${r.xS} Xỉu · ${r.conflict?'⚡ Mâu thuẫn':'✅ Đồng thuận'}`,s5b,r.conflict);
}

/* ─── LONG PRESS VARS ─── */
let _lpTimer=null, _lpActive=false;
function lpStart(i){
  _lpActive=false;
  _lpTimer=setTimeout(()=>{
    _lpActive=true;
    navigator.vibrate&&navigator.vibrate(60);
    if(!S.exportMode){
      S.exportMode=true;
      S.exportSel=[S.hist[i].ts];
    }
    render();
  },2000);
}
function lpEnd(i,e){
  clearTimeout(_lpTimer);
  if(_lpActive){e.preventDefault&&e.preventDefault();return;}
  if(S.exportMode){
    // tap in export mode = toggle selection
    const ts=S.hist[i].ts;
    if(S.exportSel.includes(ts)) S.exportSel=S.exportSel.filter(x=>x!==ts);
    else S.exportSel.push(ts);
    render();
  } else {
    openHist(i);
  }
}
function cancelExport(){S.exportMode=false;S.exportSel=[];render();}
function selAll(){
  // Lọc theo bộ lọc hiện tại nếu có
  const searchTerm=(S.histFilter.lg||'').toLowerCase().trim();
  const filteredH=searchTerm 
    ? S.hist.filter(r=>{
        const lg=r.form.lg||'';
        const tA=r.form.tA||'';

        return lg.toLowerCase().includes(searchTerm) || 
               tA.toLowerCase().includes(searchTerm) || 
               tB.toLowerCase().includes(searchTerm);

}

// ── Outcome helpers (OU = Tài/Xỉu, HC = Kèo chấp) ──
const OC={'W':['✅','THẮNG','#00e676'],'L':['❌','THUA','#ff1744'],'P':['🤝','HOÀ','#ffd700']};
function markOutcomeOU(ts,o){
  S.hist=S.hist.map(r=>r.ts===ts?{...r,outcomeOU:r.outcomeOU===o?null:o}:r);
  if(S.ar&&S.ar.ts===ts)S.ar={...S.ar,outcomeOU:S.ar.outcomeOU===o?null:o};
  navigator.vibrate&&navigator.vibrate(o==='W'?[30,20,30]:o==='L'?[60]:20);
  toastOK(o==='W'?'⚽ TÀI/XỈU: THẮNG':o==='L'?'⚽ TÀI/XỈU: THUA':'⚽ TÀI/XỈU: HOÀ');
  render();
}
function markOutcomeHC(ts,o){
  S.hist=S.hist.map(r=>r.ts===ts?{...r,outcomeHC:r.outcomeHC===o?null:o}:r);
  if(S.ar&&S.ar.ts===ts)S.ar={...S.ar,outcomeHC:S.ar.outcomeHC===o?null:o};
  navigator.vibrate&&navigator.vibrate(o==='W'?[30,20,30]:o==='L'?[60]:20);
  toastOK(o==='W'?'♟️ KÈO CHẤP: THẮNG':o==='L'?'♟️ KÈO CHẤP: THUA':'♟️ KÈO CHẤP: HOÀ');
  render();
}
function saveNote(ts,val){
  const v=(val||'').trim();
  S.hist=S.hist.map(r=>r.ts===ts?{...r,note:v}:r);
  if(S.ar&&S.ar.ts===ts)S.ar={...S.ar,note:v};
  saveState();
  if(v)toastOK('📝 Đã lưu ghi chú');
}
function outcomeBtns(o,fnName,ts){
  return '<div style="display:flex;gap:5px">'
    +Object.entries(OC).map(([k,[ic,lb,c]])=>{
      const sel=o===k;
      return '<button onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();'+fnName+'('+ts+',' + "'" + k + "'" + ')" style="flex:1;padding:6px 2px;border-radius:8px;border:1.5px solid '+(sel?c+'88':c+'33')+';background:'+(sel?c+'20':'transparent')+';color:'+(sel?c:c+'88')+';font-size:10px;font-weight:700;cursor:pointer;font-family:Rajdhani,sans-serif;transition:all 0.13s">'
        +ic+' '+lb+'</button>';
    }).join('')
  +'</div>';

// mini badges for list cards
function outcomeMini(ou,hc,note){
  let s='';
  if(ou){const[ic,,c]=OC[ou];s+='<span style="font-size:9px;font-weight:700;color:'+c+'">⚽'+ic+'</span>';}
  if(hc){const[ic,,c]=OC[hc];s+='<span style="font-size:9px;font-weight:700;color:'+c+'">♟'+ic+'</span>';}

  return s?'<div style="display:flex;gap:3px;margin-top:2px;align-items:center">'+s+'</div>':'';
}

function renderStats(){
  const t=T(),H=S.hist;
  if(!H.length)return`<div style="text-align:center;padding:40px 20px;color:${t.mut}"><div style="font-size:44px;margin-bottom:11px">📭</div><div>Chưa có dữ liệu</div></div>`;
  const n=H.length,tc=H.filter(r=>r.rec==='T').length,xc=n-tc;
  const hc=H.filter(r=>r.conf.lb==='RẤT CAO'||r.conf.lb==='CAO').length;
  const cm=H.filter(r=>r.conflict).length, ns=H.filter(r=>!r.safety.safe).length;
  const kpp=H.filter(r=>r.kp.pri).length;
  const acp=+(H.reduce((a,r)=>a+r.condP,0)/n).toFixed(1);
  const apt=+(H.reduce((a,r)=>a+r.ptPct,0)/n).toFixed(1);
  const tp=((tc/n)*100).toFixed(0),xp=((xc/n)*100).toFixed(0);
  const sb=(lb,v,c)=>`<div class="sbox"><div style="font-size:22px;font-weight:700;color:${c};font-family:'Rajdhani',monospace">${v}</div><div style="font-size:8px;color:${t.mut};text-transform:uppercase;letter-spacing:1px;margin-top:1px">${lb}</div></div>`;
  return `
  <div class="sg3">${sb('Tổng',n,t.ac)}${sb('TÀI',`${tc}(${tp}%)`,t.gr)}${sb('XỈU',`${xc}(${xp}%)`,t.or)}</div>
  <div class="sg3">${sb('Tự tin cao',hc,t.gd)}${sb('Mâu thuẫn',cm,t.gd)}${sb('Không AT',ns,t.rd)}</div>
  <div class="card" style="background:${t.card}">
    <div style="font-size:9px;color:${t.mut};letter-spacing:2px;text-transform:uppercase;margin-bottom:7px">Phân bổ TÀI / XỈU</div>
    <div style="height:13px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:5px">
      <div style="width:${tp}%;background:linear-gradient(90deg,${t.gr},${t.ac});border-radius:6px 0 0 6px;min-width:${tc>0?'4px':'0'}"></div>
      <div style="flex:1;background:linear-gradient(90deg,${t.or},${t.rd});border-radius:0 6px 6px 0"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px"><span style="color:${t.gr}">TÀI ${tp}%</span><span style="color:${t.or}">XỈU ${xp}%</span></div>
  </div>
  <div class="card" style="background:${t.card}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
      <div>
        <div style="font-size:9px;color:${t.mut};letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">P(≥3|BTTS) TB</div>
        <div style="font-size:26px;font-weight:700;color:${+acp>80?t.gr:+acp>=60?t.gd:t.rd};font-family:'Rajdhani',monospace">${acp}%</div>
        ${pbar(+acp,t.a2)}
      </div>
      <div>
        <div style="font-size:9px;color:${t.mut};letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">P_total TB</div>
        <div style="font-size:26px;font-weight:700;color:${+apt>51?t.gr:t.rd};font-family:'Rajdhani',monospace">${apt}%</div>
        ${pbar(+apt,+apt>51?t.gr:t.rd)}
      </div>
    </div>
  </div>
  ${kpp>0?`<div style="background:${t.rd}0a;border:1px solid ${t.rd}33;border-radius:11px;padding:11px 12px;font-size:11px;color:${t.mut}">⚡ <b style="color:${t.rd}">${kpp} trận</b> có chênh lệch kèo phụ bất thường — nên xem lại chi tiết</div>`:''}
  ${(()=>{
    function wrBlock(label,icon,items,accentC){
      if(!items.length)return '<div style="flex:1;background:'+t.bg+';border-radius:11px;padding:11px;border:1px solid '+t.brd+'33;text-align:center;font-size:9px;color:'+t.mut+'55">'+icon+' '+label+'<br>chưa có dữ liệu</div>';
      const w=items.filter(r=>r==='W').length;
      const l=items.filter(r=>r==='L').length;
      const p=items.filter(r=>r==='P').length;
      const total=items.length;
      const wr=((w/total)*100).toFixed(0);
      const wc=+wr>=55?t.gr:+wr>=45?t.gd:t.rd;
      return '<div style="flex:1;background:'+t.card+';border-radius:11px;padding:11px;border:1px solid '+accentC+'33">'
        +'<div style="font-size:8px;color:'+accentC+';letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px">'+icon+' '+label+'</div>'
        +'<div style="font-size:34px;font-weight:700;color:'+wc+';font-family:Rajdhani,monospace;line-height:1;margin-bottom:5px">'+wr+'%</div>'
        +'<div style="height:7px;border-radius:4px;overflow:hidden;background:'+t.bg+';margin-bottom:6px">'
          +'<div style="height:100%;width:'+wr+'%;background:'+wc+';border-radius:4px;transition:width 0.5s"></div>'
        +'</div>'
        +'<div style="font-size:8px;display:flex;gap:6px;flex-wrap:wrap">'
          +'<span style="color:'+t.gr+'">✅'+w+'W</span>'
          +'<span style="color:'+t.rd+'">❌'+l+'L</span>'
          +'<span style="color:'+t.gd+'">🤝'+p+'H</span>'
          +'<span style="color:'+t.mut+'55">'+total+'tr</span>'
        +'</div>'
      +'</div>';
    }
    const ouData=H.filter(r=>r.outcomeOU).map(r=>r.outcomeOU);
    const hcData=H.filter(r=>r.outcomeHC).map(r=>r.outcomeHC);
    const hasAny=ouData.length||hcData.length;
    if(!hasAny)return '<div style="border-radius:11px;padding:12px;background:'+t.bg+';border:1px solid '+t.brd+'55;text-align:center;font-size:10px;color:'+t.mut+'">💡 Đánh dấu W/L/H ở trang kết quả để xem tỷ lệ thắng</div>';
    return '<div style="font-size:9px;color:'+t.mut+';letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🏆 Tỷ lệ thắng thực tế</div>'
      +'<div style="display:flex;gap:9px;margin-bottom:4px">'
        +wrBlock('Tài Xỉu','⚽',ouData,t.gr)
        +wrBlock('Kèo Chấp','♟️',hcData,t.or)
      +'</div>';
  })()}

  // ── League winrate chart ──
  ${(()=>{
    // Group history by league
    const lgMap={};
    H.forEach(r=>{
      const lg=(r.form&&r.form.lg&&r.form.lg.trim())||'Không rõ giải';
      if(!lgMap[lg]) lgMap[lg]={total:0,tai:0,xiu:0,ouW:0,ouL:0,ouP:0,ouN:0};
      const m=lgMap[lg];
      m.total++;
      if(r.rec==='T') m.tai++; else m.xiu++;
      if(r.outcomeOU==='W') m.ouW++;
      else if(r.outcomeOU==='L') m.ouL++;
      else if(r.outcomeOU==='P') m.ouP++;
      if(r.outcomeOU) m.ouN++;
    });
    const lgs=Object.entries(lgMap).sort((a,b)=>b[1].total-a[1].total);
    if(!lgs.length) return '';
    const maxTotal=lgs[0][1].total||1;
    const rows=lgs.map(([name,m])=>{
      const tPct=Math.round(m.tai/m.total*100);
      const xPct=100-tPct;
      const hasOutcome=m.ouN>0;
      const wr=hasOutcome?Math.round(m.ouW/m.ouN*100):null;
      const wrC=wr===null?t.mut:wr>=55?t.gr:wr>=45?t.gd:t.rd;
      const barW=Math.round(m.total/maxTotal*100);
      return '<div style="margin-bottom:12px">'
        // league name + counts
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">'
          +'<div style="font-size:11px;font-weight:700;color:'+t.txt+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">'+esc(name)+'</div>'
          +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
            +(hasOutcome?'<span style="font-size:11px;font-weight:700;color:'+wrC+'">WR '+wr+'%</span>':'')
            +'<span style="font-size:9px;color:'+t.mut+'">'+m.total+' trận</span>'
          +'</div>'
        +'</div>'
        // TÀI/XỈU split bar
        +'<div style="position:relative;height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:3px">'
          +'<div style="width:'+tPct+'%;background:'+t.gr+';min-width:'+(m.tai>0?'3px':'0')+'"></div>'
          +'<div style="flex:1;background:'+t.or+'"></div>'
        +'</div>'
        // volume bar (relative)
        +'<div style="height:3px;border-radius:2px;background:'+t.ac+'22;overflow:hidden;margin-bottom:3px">'
          +'<div style="height:100%;width:'+barW+'%;background:'+t.ac+'55;border-radius:2px"></div>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;font-size:8px;color:'+t.mut+'">'
          +'<span style="color:'+t.gr+'">T '+m.tai+' ('+tPct+'%)</span>'
          +(hasOutcome?'<span style="color:'+t.mut+'">'+m.ouW+'W '+m.ouL+'L '+m.ouP+'H</span>':'<span style="color:'+t.mut+'55">chưa có kết quả</span>')
          +'<span style="color:'+t.or+'">X '+m.xiu+' ('+xPct+'%)</span>'
        +'</div>'
      +'</div>';
    }).join('');
    return '<div style="font-size:9px;color:'+t.mut+';letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:4px">📊 Thống kê theo giải đấu</div>'
      +'<div class="card" style="background:'+t.card+'">'
        +rows
        +'<div style="font-size:9px;color:'+t.mut+'55;text-align:center;margin-top:4px">WR = tỷ lệ thắng TÀI/XỈU (chỉ tính kèo đã cập nhật kết quả)</div>'
      +'</div>';
  })()}`;
}

const CMP_MAX=5;
function renderCompare(){
  const t=T(),H=S.hist;
  if(H.length<2)return`<div style="text-align:center;padding:40px 20px;color:${t.mut}"><div style="font-size:44px;margin-bottom:11px">⚖️</div><div>Cần ít nhất 2 phân tích để so sánh</div></div>`;

  const sel=H.filter(r=>S.cids.includes(r.ts));
  const n=sel.length;
  const COL=78; // px per match column

  // ── Selection list ──
  const lst=H.map(r=>{
    const on=S.cids.includes(r.ts);
    const dis=!on&&S.cids.length>=CMP_MAX;
    const idx=on?S.cids.indexOf(r.ts)+1:0;
    return `<div onclick="${dis?'':'togCmp('+r.ts+')'}" class="card" style="background:${on?t.a2+'18':t.card};border-color:${on?t.a2+'88':t.brd};cursor:${dis?'default':'pointer'};opacity:${dis?0.35:1};display:flex;align-items:center;gap:9px;margin-bottom:7px;padding:10px 12px;transition:all 0.15s">
      <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${on?t.a2:t.brd};background:${on?t.a2:'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:#fff;transition:all 0.15s">
        ${on?idx:''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;color:${t.gd};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.form.tA)||'Đội A'} vs ${esc(r.form.tB)||'Đội B'}</div>
        <div style="font-size:9px;color:${t.mut};margin-top:1px">${esc(r.form.lg)||'—'} · ${new Date(r.ts).toLocaleDateString('vi-VN')}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        ${chip(r.rec==='T'?'TÀI':'XỈU',r.betC)}
        ${outcomeMini(r.outcomeOU,r.outcomeHC)}
      </div>
    </div>`;
  }).join('');

  // ── Header bar ──
  const hdr=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:9px;color:${t.mut};letter-spacing:2px;text-transform:uppercase">
      Chọn tối đa <b style="color:${t.a2}">${CMP_MAX}</b> trận · đã chọn <b style="color:${n>0?t.ac:t.mut}">${n}</b>
    </div>
    ${n>0?`<button onclick="S.cids=[];render()" style="font-size:9px;padding:4px 10px;background:${t.rd}14;border:1px solid ${t.rd}33;border-radius:7px;color:${t.rd};cursor:pointer;font-family:'Rajdhani',sans-serif">✕ Bỏ tất cả</button>`:''}
  </div>`;

  if(n<2) return hdr+lst;

  // ── Comparison table (horizontal scroll) ──
  const LBLW=62;
  const metrics=[
    {lb:'ODDS1',   fn:r=>r.o1,       fmt:v=>v,        hi:(v,a)=>v===Math.min(...a)},
    {lb:'ODDS2',   fn:r=>r.o2,       fmt:v=>v,        hi:(v,a)=>v===Math.min(...a)},
    {lb:'GAP',     fn:r=>+r.gap,     fmt:v=>v,        hi:(v,a)=>v===Math.max(...a)},
    {lb:'P(≥3|B)', fn:r=>+r.condP,   fmt:v=>p1(v),    hi:(v,a)=>v===Math.max(...a)},
    {lb:'P_TOTAL', fn:r=>+r.ptPct,   fmt:v=>p1(v),    hi:(v,a)=>v===Math.max(...a)},
    {lb:'CONF',    fn:r=>({THẤP:0,'TRUNG BÌNH':1,CAO:2,'RẤT CAO':3}[r.conf.lb]||0),
                             fmt:(v,r)=>r.conf.lb,    hi:(v,a)=>v===Math.max(...a)},
  ];

  const totalW=LBLW+n*COL;

  const colHeaders=sel.map((r,i)=>{
    const colors=[t.ac,t.a2,t.gr,t.or,'#b388ff'];
    const c=colors[i%colors.length];
    const short=(r.form.tA||'A').slice(0,6)+'v'+(r.form.tB||'B').slice(0,4);
    return `<div style="width:${COL}px;flex-shrink:0;text-align:center;padding:0 2px">
      <div style="font-size:7px;font-weight:700;color:${c};text-transform:uppercase;letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(short)}</div>
      <div style="font-size:7px;color:${t.mut};margin-top:1px">${new Date(r.ts).getDate()}/${new Date(r.ts).getMonth()+1}</div>
    </div>`;
  }).join('');

  const metricRows=metrics.map(m=>{
    const vals=sel.map(r=>m.fn(r));
    const cells=sel.map((r,i)=>{
      const v=vals[i];
      const colors=[t.ac,t.a2,t.gr,t.or,'#b388ff'];
      const c=colors[i%colors.length];
      const best=m.hi(v,vals);
      return `<div style="width:${COL}px;flex-shrink:0;text-align:center;padding:3px 2px">
        <div style="border-radius:7px;padding:5px 2px;background:${best?c+'18':'transparent'};border:1px solid ${best?c+'44':'transparent'};transition:all 0.15s">
          <div style="font-size:12px;font-weight:700;color:${best?c:t.txt};font-family:'Rajdhani',monospace">${m.fmt(v,r)}</div>
        </div>
      </div>`;
    }).join('');
    return `<div style="display:flex;align-items:center;border-bottom:1px solid ${t.brd}22;padding:2px 0">
      <div style="width:${LBLW}px;flex-shrink:0;font-size:8px;color:${t.mut};text-transform:uppercase;letter-spacing:0.8px;padding-right:4px">${m.lb}</div>
      ${cells}
    </div>`;
  }).join('');

  // verdict row
  const verdictRow=`<div style="display:flex;align-items:center;padding:6px 0">
    <div style="width:${LBLW}px;flex-shrink:0;font-size:8px;color:${t.mut};text-transform:uppercase;letter-spacing:0.8px">KẾT LUẬN</div>
    ${sel.map((r,i)=>{
      const colors=[t.ac,t.a2,t.gr,t.or,'#b388ff'];

      </div>`;
    }).join('')}
  </div>`;

  // safety / conflict badges row
  const flagRow=`<div style="display:flex;align-items:flex-start;padding:4px 0">

      ${r.outcomeOU?`<div style="font-size:7px;font-weight:700;color:${OC[r.outcomeOU][2]};background:${OC[r.outcomeOU][2]}18;border-radius:5px;padding:2px 5px">⚽${r.outcomeOU==='W'?'W':r.outcomeOU==='L'?'L':'H'}</div>`:''}
      ${r.outcomeHC?`<div style="font-size:7px;font-weight:700;color:${OC[r.outcomeHC][2]};background:${OC[r.outcomeHC][2]}18;border-radius:5px;padding:2px 5px">♟${r.outcomeHC==='W'?'W':r.outcomeHC==='L'?'L':'H'}</div>`:''}
    </div>`).join('')}
  </div>`;

  const tbl=`<div style="background:${t.card};border-radius:13px;border:1px solid ${t.brd};margin-top:11px;overflow:hidden">
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none">
      <div style="min-width:${totalW}px;padding:10px 12px">
        <!-- column headers -->
        <div style="display:flex;align-items:center;padding-bottom:8px;border-bottom:1px solid ${t.brd}44;margin-bottom:4px">
          <div style="width:${LBLW}px;flex-shrink:0;font-size:8px;color:${t.mut}">TRẬN</div>
          ${colHeaders}

        ${metricRows}
        <div style="height:6px"></div>

      ✦ Ô nổi màu = giá trị tốt nhất trong nhóm &nbsp;·&nbsp; Vuốt ngang để xem thêm
    </div>
  </div>`;

  return hdr+lst+tbl;
}
function togCmp(ts){
  if(S.cids.includes(ts)) S.cids=S.cids.filter(x=>x!==ts);
  else if(S.cids.length<CMP_MAX) S.cids.push(ts);
  render();
}

      ${br==='auto'
        ?`🌓 <b style="color:${t.ac}">Tự động</b> — Sáng ${S.autoStart||6}:00 → ${S.autoEnd||18}:00 · Hiện tại: <b style="color:${autoResolved==='light'?t.ac:t.a2}">${autoResolved==='light'?'☀️ Sáng':'🌙 Tối'}</b><br><span style="font-size:9px;color:${t.mut}">Giờ bắt đầu/kết thúc có thể chỉnh trong Tuỳ Chọn Nhà Phát Triển</span>`
        :br==='light'

        <div style="font-size:18px;margin-bottom:3px">${ac.e}</div>

function togAcc(id){S.settAcc[id]=!S.settAcc[id];render();}
function setTh(k){S.tk=k;render();}
function setBrightness(b){S.brightness=b;render();}
function adjCfg(key,delta,min,max){
  const v=+(S.cfg[key]+delta).toFixed(4);
  S.cfg[key]=Math.max(min,Math.min(max,v));
  render();
}
function saveCfg(){
  // Deep-copy current cfg as saved snapshot
  S.cfgSaved=JSON.parse(JSON.stringify(S.cfg));
  toastOK('✅ Đã lưu thông số phân tích');
}
function resetCfg(){
  S.cfg={
    o1_tai_strong:1.55,o1_tai_edge:1.60,o1_xiu_edge:1.80,o1_xiu_signal:1.83,
    gap_tai:0.20,gap_xiu:0.30,
    cp_tai:80,cp_xiu:60,
    pt_buffer:5,pt_bench:53,
    safe_delta:0.25,safety_min:65,
    kp_ignore:2,kp_mild:5,kp_notable:9,
    hc_xiu_signal:1.83,hc_khoang_cach:0.28,hc_he_so:0.5,
    hc_gap_nho:0.20,hc_gap_lon:0.30,
    hc_ou_cao:2.75,hc_ou_thap:2.25,
    hc_bypass:0.25,
  };
  render();toastOK('✅ Đã đặt lại thông số mặc định');
}
function adjAuto(type,delta){
  if(type==='reset'){S.autoStart=6;S.autoEnd=18;render();return;}
  if(type==='start'){
    S.autoStart=Math.max(0,Math.min(23,(S.autoStart||6)+delta));
    if(S.autoStart>=(S.autoEnd||18)) S.autoEnd=Math.min(23,S.autoStart+1);
  } else {
    S.autoEnd=Math.max(1,Math.min(24,(S.autoEnd||18)+delta));
    if(S.autoEnd<=(S.autoStart||6)) S.autoStart=Math.max(0,S.autoEnd-1);
  }
  render();
}

function openDev(){
  if(!S.pin){
    S.settAcc.pin=true;S.devPending=true;
    render();toastWarn('⚠️ Vui lòng đặt mật khẩu 8 số trước để truy cập mục này');return;
  }
  S.pscr='dev';render();
}

/* ════ PIN SETTINGS INLINE ════ */
function renderPinSettings(){
  const t=T(),step=S.ppStep;
  if(step==='idle')return`<div style="display:flex;gap:7px">
    <button onclick="startPin()" style="flex:1;padding:11px;background:${t.a2}22;border:1px solid ${t.a2}44;border-radius:9px;color:${t.a2};font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif">${S.pin?'🔄 Đổi':'🔐 Đặt mật khẩu'}</button>
    ${S.pin?`<button onclick="clearPin()" style="flex:1;padding:11px;background:${t.rd}14;border:1px solid ${t.rd}44;border-radius:9px;color:${t.rd};font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif">🔓 Tắt</button>`:''}
  </div>`;
  if(step==='entering')return renderInlinePad('Nhập mật khẩu mới (8 số)','nd','nextPin');
  if(step==='confirm') return renderInlinePad('Xác nhận mật khẩu','cd','savePin');
  if(step==='done')return`<div style="text-align:center;padding:10px 0">
    <div style="font-size:32px;margin-bottom:7px">✅</div>
    <div style="font-size:13px;font-weight:700;color:${t.gr}">Đặt mật khẩu thành công!</div>
    <button onclick="S.ppStep='idle';render()" style="margin-top:12px;padding:9px 24px;background:${t.bg2};border:none;border-radius:9px;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif">Xong</button>
  </div>`;
}
function renderInlinePad(lbl,dk,fn){
  const t=T(),dg=S[dk]||[];
  return `<div>
    <div style="font-size:10px;color:${t.mut};letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:11px">${lbl}</div>
    <div style="display:flex;justify-content:center;gap:13px;margin-bottom:13px">
      ${[0,1,2,3,4,5,6,7].map(i=>`<div style="width:13px;height:13px;border-radius:50%;background:${i<dg.length?t.ac:'transparent'};border:2px solid ${i<dg.length?t.ac:t.brd};transition:all 0.13s"></div>`).join('')}
    </div>
    ${S.pe?`<div style="text-align:center;font-size:11px;color:${t.rd};margin-bottom:9px">${S.pe}</div>`:''}
    <div class="kp">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`
        <button class="kb${k===''?' emp':k==='⌫'?' del':''}" onclick="${k===''?'':k==='⌫'?`ipBk('${dk}')`:`ipPr('${dk}',${k},'${fn}')`}">${k}</button>`).join('')}
    </div>
    <button onclick="S.ppStep='idle';S.pe='';render()" style="width:100%;margin-top:11px;padding:9px;background:transparent;border:1px solid ${t.brd};border-radius:9px;color:${t.mut};font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif">Huỷ</button>
  </div>`;
}
function ipBk(k){S[k]=(S[k]||[]).slice(0,-1);S.pe='';render();}
function ipPr(k,d,fn){S[k]=S[k]||[];if(S[k].length>=8)return;S[k]=[...S[k],d];S.pe='';if(S[k].length===8)window[fn]();else render();}
function startPin(){S.ppStep='entering';S.nd=[];S.cd=[];S.pe='';render();}
function nextPin(){S.pnew=S.nd.join('');S.ppStep='confirm';S.cd=[];render();}
function savePin(){if(S.cd.join('')===S.pnew){S.pin=S.pnew;S.ppStep='done';S.pe='';if(S.devPending){S.devPending=false;setTimeout(()=>{S.pscr='dev';render();},800);}}else{S.pe='Mật khẩu không khớp!';S.cd=[];}render();}
function clearPin(){S.pin='';S.ppStep='idle';render();}

function pBk(){S.pd=S.pd.slice(0,-1);S.pe='';renderPinOverlay();}
function pPr(d){
  if(S.pd.length>=8)return;
  S.pd=[...S.pd,d];S.pe='';renderPinOverlay();
  if(S.pd.length===8){
    if(S.pd.join('')===S.pin){
      S.pscr=null;S.pd=[];S.tab='dev';render();
    } else {
      S.pshk=true;S.pe='Sai mật khẩu';renderPinOverlay();
      setTimeout(()=>{S.pshk=false;S.pd=[];S.pe='';renderPinOverlay();},560);
    }
  }
}
function closePin2(){S.pscr=null;S.pd=[];S.pe='';render();}

/* ═══════════════════════════════════════════
   ATTACH EVENTS (line scroll)
═══════════════════════════════════════════ */
// Cycle loading steps text
function cycleLoadingSteps(){
  if(S.tab!=='loading')return;
  const steps=['Đọc dữ liệu odds BTTS…','Tính xác suất P_total…','Phân tích kèo chấp…','Đang tổng hợp kết quả…'];
  let i=0;
  const el=document.getElementById('loading-step');
  if(!el)return;
  const iv=setInterval(()=>{
    if(S.tab!=='loading'){clearInterval(iv);return;}
    i=(i+1)%steps.length;
    const e=document.getElementById('loading-step');
    if(!e){clearInterval(iv);return;}
    e.style.opacity='0';
    setTimeout(()=>{if(e){e.textContent=steps[i];e.style.opacity='1';}},250);
  },600);
}

function attachEv(){
  const ls=document.getElementById('lscroll');
  if(ls){
    // FIX: Kiểm tra an toàn trước khi indexOf
    const mlVal=S.form.ml;
    const idx=mlVal!=null?LV.indexOf(mlVal):-1;
    const btns=ls.querySelectorAll('.lbtn');
    if(idx>=0&&idx<btns.length&&btns[idx])setTimeout(()=>btns[idx].scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'}),50);
  }
  const hs=document.getElementById('hscroll');
  if(hs){
    const HV=[0,0.25,0.5,0.75,1,1.25,1.5,1.75,2,2.25,2.5,2.75,3,3.25,3.5,3.75,4];
    const mh=S.form.mh!==''&&S.form.mh!=null?Math.abs(+S.form.mh):null;
    const idx2=mh!==null?HV.findIndex(v=>Math.abs(v-mh)<0.001):-1;
    const btns2=hs.querySelectorAll('.lbtn');
    if(idx2>=0&&idx2<btns2.length&&btns2[idx2])setTimeout(()=>btns2[idx2].scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'}),50);
  }
}

function checkExpiry(){
  if(!S.firstTs||S.expLock)return;
  const elapsed=Date.now()-S.firstTs;
  const THREE_DAYS=3*24*60*60*1000;
  if(elapsed>=THREE_DAYS){S.expLock=true;S.expPd=[];S.expErr="";}
}

/* ═══════════════════════════════════════════
   ACTIVATION FILE HANDLER
═══════════════════════════════════════════ */
function loadActivationFile(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>applyActivation(ev.target.result);
    reader.readAsText(file);
  };
  inp.click();
}

function applyActivation(raw){
  try{
    const d=JSON.parse(raw.trim());
    // Kiểm tra đây có phải file kích hoạt không
    if(d.type!=='activation') {
      toastErr('❌ File này không phải file kích hoạt');return;
    }
    // Kiểm tra secret
    if(d.secret!==ACT_SECRET){
      toastErr('❌ Mã kích hoạt không hợp lệ');
      S.expShk=true;renderExpLock();
      setTimeout(()=>{S.expShk=false;renderExpLock();},560);
      return;
    }
    // Kiểm tra file có hết hạn chưa
    if(d.validUntil&&Date.now()>d.validUntil){
      toastErr('❌ File kích hoạt đã hết hạn');return;
    }
    // Áp dụng gia hạn
    const days=d.extendDays||3;
    S.expLock=false;
    S.expPd=[];
    S.expErr='';
    // firstTs = now - (THREE_DAYS - extMs)
    // → còn đúng extMs (= days*24h) kể từ bây giờ trước khi hết hạn
    const THREE_DAYS=3*24*60*60*1000;
    const extMs=days*24*60*60*1000;
    S.firstTs=Date.now()-(THREE_DAYS-extMs);
    saveState();
    render();
    navigator.vibrate&&navigator.vibrate([30,20,60,20,30]);
    toastOK('✅ Kích hoạt thành công! Gia hạn thêm '+days+' ngày');
  }catch(e){
    toastErr('❌ File không hợp lệ: '+e.message);
  }
}

function saveState(){
  try{
    const data={
      tk:S.tk, brightness:S.brightness,
      hist:S.hist,
      pin:S.pin,
      form:S.form,
      arTs:S.ar?S.ar.ts:null,
      tab:(S.tab==='loading'?'home':S.tab==='result'&&!S.ar?'home':S.tab),
      autoStart:S.autoStart, autoEnd:S.autoEnd,
      cfg:S.cfg, cfgSaved:S.cfgSaved||null,
      firstTs:S.firstTs, expLock:S.expLock,
      sub:S.sub,
      profile:S.profile,
      lsSlot:S.lsSlot,
    };
    localStorage.setItem(LS_KEY,JSON.stringify(data));
  }catch(e){}
}

function loadState(){
  try{
    // Try v7.3 key first, fall back to v7.2 for migration
    const raw=localStorage.getItem(LS_KEY)||localStorage.getItem('Ai_analyser_v7.2');
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.tk)         S.tk=d.tk;
    if(d.brightness) S.brightness=d.brightness;
    if(d.hist)       S.hist=d.hist;
    if(d.pin)        S.pin=d.pin;
    if(d.form)       S.form={...S.form,...d.form};
    if(d.autoStart!=null) S.autoStart=d.autoStart;
    if(d.autoEnd!=null)   S.autoEnd=d.autoEnd;
    if(d.cfg)        S.cfg={...S.cfg,...d.cfg};
    if(d.cfgSaved)   S.cfgSaved=d.cfgSaved;
    if(d.firstTs!=null) S.firstTs=d.firstTs;
    if(d.expLock!=null)  S.expLock=d.expLock;
    if(d.sub)        S.sub=d.sub;
    if(d.profile)    S.profile={...S.profile,...d.profile};
    if(d.lsSlot!=null) S.lsSlot=d.lsSlot;
    if(d.tab&&d.tab!=='loading') S.tab=d.tab;
    if(d.form&&d.form.hcSide==null) S.form.hcSide='home'; // migrate
    if(d.arTs)       S.ar=S.hist.find(r=>r.ts===d.arTs)||null;
    // restore active result from history
    // Migrate old records
    S.hist=S.hist.map(migrateRecord);
    // S.ar restored above from arTs
  }catch(e){}
}

async function buildResultCanvas(r){

  ].join(';');

      <span style="background:${t.ac};border-radius:20px;padding:2px 9px;font-size:8px;font-weight:700;color:#000">v7.3</span>
    </div>`;

  const bodyDiv=document.createElement('div');
  bodyDiv.style.cssText='padding:0 14px';
  bodyDiv.innerHTML=renderResult();
  bodyDiv.querySelectorAll('button').forEach(b=>b.style.display='none');
  bodyDiv.querySelectorAll('.scan-line').forEach(el=>el.style.display='none');
  bodyDiv.querySelectorAll('*').forEach(el=>{el.style.animation='none';el.style.transition='none';});

  const ftDiv=document.createElement('div');
  ftDiv.style.cssText='margin:12px 14px 0;padding:10px 14px;background:'+t.card+';border-radius:12px;border:1px solid '+t.brd+';text-align:center';
  ftDiv.innerHTML='<div style="font-size:9px;color:'+t.mut+';letter-spacing:2px">⚽ AI FOOTBALL ANALYSER v7.3 · BTTS · GAP · P_total · MrV94</div>';

  wrap.appendChild(hdrDiv);
  wrap.appendChild(bodyDiv);
  wrap.appendChild(ftDiv);
  document.body.appendChild(wrap);

  // FIX: Sử dụng try-finally để đảm bảo cleanup dù có lỗi hay không
  let canvas=null;
  try{
    await new Promise(res=>requestAnimationFrame(()=>requestAnimationFrame(res)));
    await new Promise(res=>setTimeout(res,300));

    const wRect=wrap.getBoundingClientRect();
    if(!wRect.width||!wRect.height){
      return null;
    }

    try{
      canvas=await html2canvas(wrap,{
        backgroundColor:t.bg,scale:2,useCORS:true,logging:false,
        width:430,windowWidth:430,scrollX:0,scrollY:0,
        ignoreElements:(el)=>{
          if(!el.getBoundingClientRect) return false;
          const rect=el.getBoundingClientRect();
          if(rect.width===0||rect.height===0) return true;
          if(el.id==='gbg') return true;
          if(el.classList&&el.classList.contains('scan-line')) return true;
          return false;
        },
      });
    }catch(e){ 
      canvas=null; 
    }
  }finally{
    // FIX: Luôn luôn cleanup phần tử DOM tạm thời
    if(wrap&&wrap.parentNode){
      document.body.removeChild(wrap);
    }
    S.cs=prevCs;
  }
  return canvas;
}

async function doExportImg(){
  if(!S.exportSel.length){toastWarn('⚠️ Chưa chọn kèo nào');return;}
  if(typeof html2canvas==='undefined'){toastErr('❌ Thư viện xuất ảnh chưa sẵn sàng — cần kết nối mạng');return;}
  const t=T();
  const selected=S.hist.filter(r=>S.exportSel.includes(r.ts));
  toast(`⏳ Đang xuất ${selected.length} ảnh...`);

  // Wrapper off-screen
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1;padding:10px;background:#0a0f20;';
  document.body.appendChild(wrap);

  for(let i=0;i<selected.length;i++){
    const r=selected[i];
    const cardDiv=document.createElement('div');
    cardDiv.innerHTML=buildCardHTML(r,t);
    wrap.innerHTML='';
    wrap.appendChild(cardDiv.firstElementChild);
    await new Promise(res=>setTimeout(res,80));
    try{
      const canvas=await html2canvas(wrap.firstElementChild,{
        backgroundColor:'#0a0f20',
        scale:2,
        useCORS:true,
        logging:false,
      });
      const link=document.createElement('a');
      const ta=esc(r.form.tA)||'DoiA', tb=esc(r.form.tB)||'DoiB';
      link.download=`keo_${ta.replace(/\s+/g,'_')}_vs_${tb.replace(/\s+/g,'_')}_${r.ts}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
      await new Promise(res=>setTimeout(res,400));
    }catch(e){toastErr('❌ Lỗi xuất ảnh: '+e.message);}
  }
  document.body.removeChild(wrap);
  cancelExport();
  toastOK(`✅ Đã xuất ${selected.length} ảnh thành công!`);
}

/* ── TTS welcome ── */
function speakWelcome(name){
  try{
    if(!window.speechSynthesis)return;
    speechSynthesis.cancel();
    const text=name
      ?'Chào mừng bạn đã trở lại, '+name+'! Hôm nay chúc bạn phân tích chuẩn nhé!'
      :'Chào mừng bạn đã trở lại! Hôm nay chúc bạn phân tích chuẩn nhé!';
    const utter=new SpeechSynthesisUtterance(text);
    utter.lang='vi-VN';
    utter.rate=0.88;
    utter.pitch=1.25;
    // Try to get a female / Vietnamese voice
    const trySpeak=()=>{
      const voices=speechSynthesis.getVoices();
      const vi=voices.find(v=>v.lang.startsWith('vi')&&/female|woman|girl/i.test(v.name))
             ||voices.find(v=>v.lang.startsWith('vi'))
             ||voices.find(v=>/female|woman/i.test(v.name));
      if(vi) utter.voice=vi;
      speechSynthesis.speak(utter);
    };
    if(speechSynthesis.getVoices().length>0) trySpeak();
    else{ speechSynthesis.onvoiceschanged=trySpeak; }
  }catch(e){}
}

  // Expiry countdown

  if(cd&&S.firstTs){
    const THREE_DAYS=3*24*60*60*1000;
    const remaining=Math.max(0,(S.firstTs+THREE_DAYS)-Date.now());
    const d=Math.floor(remaining/86400000);
    const h=Math.floor((remaining%86400000)/3600000);
    const m=Math.floor((remaining%3600000)/60000);
    const s=Math.floor((remaining%60000)/1000);
    cd.textContent=d>0
      ?d+'n '+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m'
      :String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    // Trigger expiry check
    if(remaining===0&&!S.expLock){S.expLock=true;render();}
  }
},1000);
